version: "3.8"

# ============================================================
#  顺丰全自动 Cookie 方案 - Docker Compose
#  配合青龙面板使用
# ============================================================
#
# 使用方式:
#   1. 复制本文件到服务器
#   2. 执行: chmod +x deploy.sh && ./deploy.sh
#   3. 首次扫码: docker compose up sf-login
#   4. 常规运行: docker compose up -d
#
# 端口说明:
#   5000 - 中继服务器 API + 管理面板
#   6080 - noVNC（仅首次登录扫码时使用）
# ============================================================

services:
  # -------------------- 中继跳板服务器 --------------------
  sf-relay:
    build:
      context: ./docker/sf-relay
      dockerfile: Dockerfile
    container_name: sf-relay
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - relay-data:/app          # SQLite 数据库持久化
    environment:
      - SF_RELAY_PORT=5000
      - SF_RELAY_TOKEN=${SF_RELAY_TOKEN:-}       # API 鉴权 Token（建议设置）
      - SF_BARK_KEY=${SF_BARK_KEY:-}              # Bark 推送 Key
      - SF_PUSHPLUS_TOKEN=${SF_PUSHPLUS_TOKEN:-}  # PushPlus Token
    networks:
      - sf-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # -------------------- Cookie 提取器（守护模式） --------------------
  sf-extractor:
    build:
      context: ./docker/sf-extractor
      dockerfile: Dockerfile
    container_name: sf-extractor
    restart: always
    depends_on:
      sf-relay:
        condition: service_healthy
    volumes:
      - browser-data:/app/browser_data   # 浏览器登录态持久化（关键！）
      - extractor-logs:/app/logs
    environment:
      - SF_RELAY_URL=http://sf-relay:5000
      - SF_RELAY_TOKEN=${SF_RELAY_TOKEN:-}
      - EXTRACT_INTERVAL=${EXTRACT_INTERVAL:-3600}  # 提取间隔（秒）
    networks:
      - sf-net
    # 守护模式：Xvfb + 定时提取
    command: ["daemon"]

  # -------------------- noVNC 登录器（按需启动） --------------------
  # 仅首次扫码登录时使用，登录完成后停止
  sf-login:
    build:
      context: ./docker/sf-extractor/noVNC
      dockerfile: Dockerfile
    container_name: sf-login
    restart: "no"          # 登录完就停止，不自动重启
    depends_on:
      sf-relay:
        condition: service_healthy
    ports:
      - "6080:6080"        # noVNC Web 界面
    volumes:
      - browser-data:/app/browser_data   # 共享浏览器数据（关键！）
    environment:
      - SF_RELAY_URL=http://sf-relay:5000
      - SF_RELAY_TOKEN=${SF_RELAY_TOKEN:-}
      - NOVNC_PORT=6080
    networks:
      - sf-net
    profiles:
      - login              # 不随 docker compose up -d 自动启动

volumes:
  relay-data:
    name: sf-relay-data
  browser-data:
    name: sf-browser-data    # 浏览器登录态，最关键的数据
  extractor-logs:
    name: sf-extractor-logs

networks:
  sf-net:
    driver: bridge
    name: sf-network
    # 如果青龙面板用 docker-compose 部署，可以让它加入同一网络
    # external: true        # 如果 sf-net 已由青龙创建，取消此注释
