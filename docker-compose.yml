# ============================================================
#  QL-SF 顺丰全自动 Cookie 方案 - Docker Compose
# ============================================================
#
#  Portainer 部署方式:
#    Stacks → Add stack → Repository
#    Repository URL: https://github.com/Hayfan-wu/QL-SF.git
#    Compose path: docker-compose.yml（默认，不用改）
#
#  端口:
#    5000 = 中继 API + 管理面板
#    6080 = noVNC（仅首次扫码登录时使用）
#
#  环境变量（在 Portainer Stack 的 Env vars 中填写）:
#    SF_RELAY_TOKEN    = 鉴权 Token（必填，随机字符串）
#    SF_BARK_KEY       = Bark 推送 Key（可选）
#    SF_PUSHPLUS_TOKEN = PushPlus Token（可选）
#    EXTRACT_INTERVAL  = Cookie 刷新间隔秒数（默认3600）
#
# ============================================================

services:

  # ========== 中继服务器（Cookie 存储 + REST API） ==========
  sf-relay:
    build:
      context: .
      dockerfile: docker/sf-relay/Dockerfile
    container_name: sf-relay
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - sf-relay-data:/app
    environment:
      - SF_RELAY_PORT=5000
      - SF_RELAY_TOKEN=${SF_RELAY_TOKEN:-sf123456token}
      - SF_BARK_KEY=${SF_BARK_KEY:-}
      - SF_PUSHPLUS_TOKEN=${SF_PUSHPLUS_TOKEN:-}
    networks:
      - sf-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ========== Cookie 提取器（守护模式，自动定时刷新） ==========
  sf-extractor:
    build:
      context: .
      dockerfile: docker/sf-extractor/Dockerfile
    container_name: sf-extractor
    restart: always
    depends_on:
      sf-relay:
        condition: service_healthy
    volumes:
      - sf-browser-data:/app/browser_data
    environment:
      - SF_RELAY_URL=http://sf-relay:5000
      - SF_RELAY_TOKEN=${SF_RELAY_TOKEN:-sf123456token}
      - EXTRACT_INTERVAL=${EXTRACT_INTERVAL:-3600}
    networks:
      - sf-net
    command: ["daemon"]

  # ========== noVNC 扫码登录器 ==========
  # 首次部署后，在 Portainer 中手动 Start 此容器
  # 扫码登录完成后 Stop 即可，日常不需要运行
  sf-login:
    build:
      context: .
      dockerfile: docker/sf-extractor/noVNC/Dockerfile
    container_name: sf-login
    restart: "no"
    depends_on:
      sf-relay:
        condition: service_healthy
    ports:
      - "6080:6080"
    volumes:
      - sf-browser-data:/app/browser_data
    environment:
      - SF_RELAY_URL=http://sf-relay:5000
      - SF_RELAY_TOKEN=${SF_RELAY_TOKEN:-sf123456token}
      - NOVNC_PORT=6080
    networks:
      - sf-net

volumes:
  sf-relay-data:
  sf-browser-data:

networks:
  sf-net:
    driver: bridge
    name: sf-network
